<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trentini Perfumes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000 url('fundohome.jpg') no-repeat center center;
      background-size: cover;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      overflow-x: hidden;
    }

    header {
      background: rgba(0, 0, 0, 0.8);
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 24px;
    }

    header .logo {
      font-weight: bold;
    }

    .menu-icon {
      cursor: pointer;
      font-size: 28px;
    }

    .category-container {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 50px;
      gap: 20px;
    }

    .category-btn {
      border: none;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .category-btn img {
      width: 500px; /* Ajuste o tamanho conforme necessário */
      height: auto;
      border-radius: 5px;
      transition: transform 0.3s ease;
    }

    .category-btn:hover img {
      transform: scale(1.1);
    }

  </style>
</head>
<body>

  <header>
    <div class="logo">Trentini | ترينتيني</div>
    <div class="menu-icon" onclick="toggleMenu()">☰</div>
  </header>

  <div class="category-container">
    <!-- Botão Masculino -->
    <button class="category-btn" onclick="location.href='masculino.html'">
      <img src="botaomasculino.png" alt="Masculino">
    </button>

    <!-- Botão Feminino -->
    <button class="category-btn" onclick="location.href='feminino.html'">
      <img src="botaofeminino.png" alt="Feminino">
    </button>
  </div>

  <script>
    // Aqui você pode adicionar scripts se precisar de mais interatividade
  </script>

</body>
</html>
