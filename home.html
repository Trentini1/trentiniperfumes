<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home - Trentini Perfumes</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body,
    html {
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
      background: #000;
      overflow: hidden;
    }

    .navbar {
      width: 100%;
      height: 60px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
    }

    .navbar h1 {
      font-size: 24px;
      font-weight: bold;
    }

    .navbar span {
      font-size: 18px;
      margin-left: 10px;
      font-style: italic;
    }

    .menu-toggle {
      font-size: 28px;
      cursor: pointer;
    }

    .menu-rapido {
      position: absolute;
      top: 60px;
      right: 0;
      background: rgba(0, 0, 0, 0.9);
      color: white;
      padding: 20px;
      display: none;
      flex-direction: column;
      gap: 10px;
      z-index: 10;
    }

    .menu-rapido a {
      color: white;
      text-decoration: none;
      font-size: 18px;
    }

    .home {
      width: 100%;
      min-height: 100vh;
      background: url('fundohome.jpg') no-repeat center center;
      background-size: cover;
      color: white;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding-top: 100px;
      overflow: hidden;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 1;
    }

    .categorias-wrapper {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2;
    }

    .categorias {
      display: flex;
      transition: transform 0.5s ease-in-out;
    }

    .categoria {
      width: 500px;
      height: 500px;
      margin: 0 20px;
      flex-shrink: 0;
      filter: blur(4px);
      transition: transform 0.3s ease, filter 0.3s ease;
    }

    .categoria.center {
      transform: scale(1.1);
      filter: none;
    }

    .categoria img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .button-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 30px;
      color: #fff;
      cursor: pointer;
      z-index: 3;
      padding: 10px;
      background-color: rgba(0, 0, 0, 0.6);
      border-radius: 50%;
    }

    .button-prev {
      left: 20px;
    }

    .button-next {
      right: 20px;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div>
      <h1>Trentini <span>ترينتيني</span></h1>
    </div>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <div class="menu-rapido" id="menu">
      <a href="#">Contato</a>
      <a href="#">Instagram</a>
      <a href="#categorias">Categorias</a>
    </div>
  </div>

  <div class="home">
    <div class="overlay"></div>
    <div class="categorias-wrapper">
      <div class="button-nav button-prev" onclick="moveCarousel('prev')">◀</div>
      <div class="categorias" id="categorias">
        <a href="#" class="categoria"><img src="botaomasculino.png" alt="Masculino"></a>
        <a href="#" class="categoria"><img src="botaofeminino.png" alt="Feminino"></a>
        <a href="#" class="categoria"><img src="botao_populares.png" alt="Populares"></a>
        <a href="#" class="categoria"><img src="botao_cremes.png" alt="Cremes"></a>
      </div>
      <div class="button-nav button-next" onclick="moveCarousel('next')">▶</div>
    </div>
  </div>

  <script>
    const categorias = document.querySelectorAll('.categoria');
    let currentIndex = 0;

    function updateCarousel() {
      categorias.forEach((categoria, index) => {
        categoria.classList.remove('center');
      });

      categorias[currentIndex].classList.add('center');

      const container = document.querySelector('.categorias');
      const offset = -currentIndex * 540; // 500px + 2*20px de margin
      container.style.transform = `translateX(${offset}px)`;
    }

    function moveCarousel(direction) {
      if (direction === 'next') {
        currentIndex = (currentIndex + 1) % categorias.length;
      } else {
        currentIndex = (currentIndex - 1 + categorias.length) % categorias.length;
      }
      updateCarousel();
    }

    function toggleMenu() {
      const menu = document.getElementById('menu');
      menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
    }

    window.onload = updateCarousel;
  </script>
</body>
</html>
