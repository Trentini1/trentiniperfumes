<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home - Trentini Perfumes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body, html {
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
      overflow-x: hidden;
      background: #000;
    }

    .top-bar {
      width: 100%;
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
    }

    .top-bar h1 {
      font-size: 24px;
      font-weight: bold;
      font-family: 'Georgia', serif;
    }

    .menu-icon {
      font-size: 30px;
      cursor: pointer;
    }

    .side-menu {
      position: fixed;
      top: 0;
      right: -250px;
      width: 250px;
      height: 100vh;
      background: #111;
      color: white;
      padding: 30px 20px;
      transition: right 0.3s ease;
      z-index: 20;
    }

    .side-menu a {
      display: block;
      color: white;
      text-decoration: none;
      margin: 20px 0;
      font-size: 18px;
    }

    .side-menu.show {
      right: 0;
    }

    .home {
      width: 100%;
      min-height: 100vh;
      background: url('fundohome.jpg') no-repeat center center;
      background-size: cover;
      color: white;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: background-color 0.5s ease;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 1;
    }

    .categorias {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 100px;
      padding: 20px;
      flex-wrap: wrap;
      z-index: 2;
      position: relative;
    }

    .categorias img {
      width: 300px;
      height: auto;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .categorias img:hover {
      transform: scale(1.05);
    }

    @media (max-width: 600px) {
      .categorias {
        flex-direction: column;
        align-items: center;
      }

      .categorias img {
        width: 90%;
      }

      .top-bar h1 {
        font-size: 18px;
      }

      .menu-icon {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <h1>Trentini | ترينتيني</h1>
    <div class="menu-icon" onclick="toggleMenu()">☰</div>
  </div>

  <div class="side-menu" id="sideMenu">
    <a href="https://instagram.com/seuinsta" target="_blank">Instagram</a>
    <a href="contato.html">Contato</a>
    <a href="masculino.html">Masculino</a>
    <a href="feminino.html">Feminino</a>
  </div>

  <div class="home">
    <div class="overlay"></div>

    <div class="categorias">
      <a href="masculino.html">
        <img src="botaomasculino.png" alt="Masculino"/>
      </a>
      <a href="feminino.html">
        <img src="botaofeminino.png" alt="Feminino"/>
      </a>
    </div>
  </div>

  <script>
    function toggleMenu() {
      document.getElementById('sideMenu').classList.toggle('show');
    }
  </script>
</body>
</html>
