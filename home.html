<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home - Trentini Perfumes</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body,
    html {
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      background: #000;
    }

    .navbar {
      width: 100%;
      height: 60px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
    }

    .navbar h1 {
      font-size: 24px;
      font-weight: bold;
    }

    .navbar span {
      font-size: 18px;
      margin-left: 10px;
      font-style: italic;
    }

    .menu-toggle {
      font-size: 28px;
      cursor: pointer;
    }

    .menu-rapido {
      position: absolute;
      top: 60px;
      right: 0;
      background: rgba(0, 0, 0, 0.9);
      color: white;
      padding: 20px;
      display: none;
      flex-direction: column;
      gap: 10px;
      z-index: 10;
    }

    .menu-rapido a {
      color: white;
      text-decoration: none;
      font-size: 18px;
    }

    .home {
      width: 100%;
      min-height: 100vh;
      background: url('fundohome.jpg') no-repeat center center;
      background-size: cover;
      color: white;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding-top: 100px;
      overflow: hidden;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 1;
    }

    .categorias {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 30px;
      z-index: 2;
      overflow: hidden;
      transition: transform 0.5s ease-in-out;
    }

    .categoria {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      overflow: hidden;
      border: 5px solid #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: transform 0.3s ease;
    }

    .categoria img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Botão de navegação */
    .button-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 30px;
      color: #fff;
      cursor: pointer;
      z-index: 3;
      padding: 10px;
      background-color: rgba(0, 0, 0, 0.6);
      border-radius: 50%;
    }

    .button-prev {
      left: 20px;
    }

    .button-next {
      right: 20px;
    }

    /* Animação da entrada da página */
    .fade-in {
      animation: fadeIn 1.2s ease-in-out;
    }

    @keyframes fadeIn {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      .categorias {
        gap: 20px;
      }

      .categoria {
        width: 90px;
        height: 90px;
      }
    }
  </style>
</head>
<body>

  <div class="navbar fade-in">
    <div>
      <h1>Trentini <span>ترينتيني</span></h1>
    </div>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <div class="menu-rapido" id="menu">
      <a href="contato.html">Contato</a>
      <a href="https://www.instagram.com">Instagram</a>
      <a href="#categorias">Categorias</a>
    </div>
  </div>

  <div class="home fade-in">
    <div class="overlay"></div>

    <div class="categorias" id="categorias">
      <a href="masculino.html" class="categoria">
        <img src="botaomasculino.png" alt="Masculino">
      </a>
      <a href="feminino.html" class="categoria">
        <img src="botaofeminino.png" alt="Feminino">
      </a>
      <a href="populares.html" class="categoria">
        <img src="botao_populares.png" alt="Populares">
      </a>
      <a href="cremes.html" class="categoria">
        <img src="botao_cremes.png" alt="Cremes">
      </a>
    </div>

    <div class="button-nav button-prev" onclick="moveCarousel('prev')">◀</div>
    <div class="button-nav button-next" onclick="moveCarousel('next')">▶</div>
  </div>

  <script>
    let currentIndex = 0;

    const categorias = document.querySelectorAll('.categoria');
    const categoriasContainer = document.getElementById('categorias');

    function moveCarousel(direction) {
      if (direction === 'next') {
        currentIndex++;
        if (currentIndex >= categorias.length) {
          currentIndex = 0;
        }
      } else if (direction === 'prev') {
        currentIndex--;
        if (currentIndex < 0) {
          currentIndex = categorias.length - 1;
        }
      }

      const offset = -currentIndex * 150; // Espaçamento entre os botões
      categoriasContainer.style.transform = `translateX(${offset}px)`;
    }

    // Inicializa o carrossel
    window.onload = () => {
      moveCarousel('next');
    };

    function toggleMenu() {
      const menu = document.getElementById("menu");
      menu.style.display = menu.style.display === "flex" ? "none" : "flex";
    }
  </script>

</body>
</html>
