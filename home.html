<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home - Trentini Perfumes</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
      overflow-x: hidden;
      background: #000;
    }

    .navbar {
      width: 100%;
      height: 60px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
    }

    .navbar h1 {
      font-size: 24px;
      font-weight: bold;
    }

    .navbar span {
      font-size: 18px;
      margin-left: 10px;
      font-style: italic;
    }

    .menu-toggle {
      font-size: 28px;
      cursor: pointer;
    }

    .menu-rapido {
      position: absolute;
      top: 60px;
      right: 0;
      background: rgba(0, 0, 0, 0.9);
      color: white;
      padding: 20px;
      display: none;
      flex-direction: column;
      gap: 10px;
      z-index: 10;
    }

    .menu-rapido a {
      color: white;
      text-decoration: none;
      font-size: 18px;
    }

    .home {
      width: 100%;
      min-height: 100vh;
      background: url('fundohome.jpg') no-repeat center center;
      background-size: cover;
      color: white;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: background-color 0.5s ease;
      padding-top: 80px;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 1;
    }

    .video-container {
      position: relative;
      width: 100%;
      height: 60vh;
      overflow: hidden;
      z-index: 2;
    }

    .video-container video {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .categorias {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 50px;
      padding: 0 20px;
      flex-wrap: wrap;
      z-index: 2;
      position: relative;
    }

    .categorias img {
      width: 300px;
      height: auto;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .categorias img:hover {
      transform: scale(1.05);
    }

    @media (max-width: 600px) {
      .categorias {
        flex-direction: column;
        gap: 20px;
      }
      .categorias img {
        width: 80%;
      }
    }

    /* Animação */
    .fade-in {
      animation: fadeIn 1.2s ease-in-out;
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="navbar fade-in">
    <div>
      <h1>Trentini <span>ترينتيني</span></h1>
    </div>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <div class="menu-rapido" id="menu">
      <a href="contato.html">Contato</a>
      <a href="https://www.instagram.com">Instagram</a>
      <a href="#categorias">Categorias</a>
    </div>
  </div>

  <div class="home fade-in">
    <div class="overlay"></div>

    <div class="video-container">
      <video autoplay muted loop playsinline>
        <source src="yt1z.net - ASAD by Lattafa (1080p).mp4" type="video/mp4">
        Seu navegador não suporta o vídeo.
      </video>
    </div>

    <div class="categorias" id="categorias">
      <a href="masculino.html">
        <img src="botaomasculino.png" alt="Masculino">
      </a>
      <a href="feminino.html">
        <img src="botaofeminino.png" alt="Feminino">
      </a>
    </div>
  </div>

  <script>
    function toggleMenu() {
      const menu = document.getElementById("menu");
      menu.style.display = menu.style.display === "flex" ? "none" : "flex";
    }
  </script>

</body>
</html>
