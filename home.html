<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trentini Perfumes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000 url('fundohome.jpg') no-repeat center center;
      background-size: cover;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      overflow-x: hidden;
    }

    header {
      background: rgba(0, 0, 0, 0.8);
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 24px;
    }

    header .logo {
      font-weight: bold;
    }

    .menu-icon {
      cursor: pointer;
      font-size: 28px;
    }

    .carousel-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      padding: 40px 0;
    }

    .carousel {
      display: flex;
      gap: 30px;
      transition: transform 0.5s ease;
      align-items: center;
    }

    .carousel img {
      width: 180px;
      height: auto;
      opacity: 0.3;
      filter: blur(3px);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .carousel img.active {
      width: 400px;
      opacity: 1;
      filter: none;
      transform: scale(1.1);
      z-index: 1;
    }

    .nav-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      font-size: 40px;
      cursor: pointer;
      padding: 10px 20px;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
    }

    .nav-left { left: 10px; }
    .nav-right { right: 10px; }

    @media (max-width: 768px) {
      .carousel img.active { width: 300px; }
      .carousel img { width: 100px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Trentini | ترينتيني</div>
    <div class="menu-icon" onclick="toggleMenu()">☰</div>
  </header>

  <div class="carousel-container">
    <button class="nav-btn nav-left" onclick="prevSlide()">&#10094;</button>
    <div class="carousel" id="carousel">
      <img src="botaomasculino.png" onclick="location.href='masculino.html'">
      <img src="botaofeminino.png" onclick="location.href='feminino.html'">
      <img src="botao3.png" onclick="alert('Outro botão')">
      <img src="botao4.png" onclick="alert('Mais um')">
      <img src="botao5.png" onclick="alert('E outro!')">
    </div>
    <button class="nav-btn nav-right" onclick="nextSlide()">&#10095;</button>
  </div>

  <script>
  const carousel = document.getElementById('carousel');
 let currentIndex = Math.floor(document.querySelectorAll('#carousel img').length / 2);

 function updateCarousel() {
  const imgs = carousel.querySelectorAll('img');
  imgs.forEach((img) => {
    img.classList.remove('active');
    img.style.zIndex = '0';
    img.style.opacity = '0.3';
    img.style.filter = 'blur(3px)';
    img.style.transform = 'scale(1)';
  });

  const activeImg = imgs[currentIndex];
  activeImg.classList.add('active');
  activeImg.style.zIndex = '1';
  activeImg.style.opacity = '1';
  activeImg.style.filter = 'none';
  activeImg.style.transform = 'scale(1.1)';

  const container = document.querySelector('.carousel-container');
  const containerCenter = container.offsetWidth / 2;
  const activeImgRect = activeImg.getBoundingClientRect();
  const containerRect = container.getBoundingClientRect();
  const activeImgCenter = activeImgRect.left + activeImgRect.width / 2;
  const offset = activeImgCenter - (containerRect.left + containerCenter);

  carousel.style.transform = `translateX(-${offset}px)`;
}

  function nextSlide() {
    const imgs = carousel.querySelectorAll('img');
    currentIndex = (currentIndex + 1) % imgs.length;
    updateCarousel();
  }

  function prevSlide() {
    const imgs = carousel.querySelectorAll('img');
    currentIndex = (currentIndex - 1 + imgs.length) % imgs.length;
    updateCarousel();
  }

  window.addEventListener('load', updateCarousel);
  window.addEventListener('resize', updateCarousel);
</script>

</body>
</html>
