<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home - Trentini Perfumes</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body,
    html {
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
      overflow-x: hidden;
      background: #000;
    }

    .navbar {
      width: 100%;
      height: 60px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
    }

    .navbar h1 {
      font-size: 24px;
      font-weight: bold;
    }

    .navbar span {
      font-size: 18px;
      margin-left: 10px;
      font-style: italic;
    }

    .menu-toggle {
      font-size: 28px;
      cursor: pointer;
    }

    .menu-rapido {
      position: absolute;
      top: 60px;
      right: 0;
      background: rgba(0, 0, 0, 0.9);
      color: white;
      padding: 20px;
      display: none;
      flex-direction: column;
      gap: 10px;
      z-index: 10;
    }

    .menu-rapido a {
      color: white;
      text-decoration: none;
      font-size: 18px;
    }

    .home {
      width: 100%;
      min-height: 100vh;
      background: url('fundohome.jpg') no-repeat center center;
      background-size: cover;
      color: white;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding-top: 100px;
      overflow: hidden;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 1;
    }

    .categorias {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 50px;
      padding: 0 20px;
      flex-wrap: wrap;
      z-index: 2;
      position: relative;
    }

    .categoria {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      overflow: hidden;
      border: 5px solid #fff;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: transform 0.3s ease;
    }

    .categoria img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .categoria:hover {
      transform: scale(1.1);
    }

    /* Animação da roleta */
    @keyframes rotate {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    .rotate {
      animation: rotate 10s linear infinite;
    }

    .fade-in {
      animation: fadeIn 1.2s ease-in-out;
    }

    @keyframes fadeIn {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      .categorias {
        flex-direction: column;
        gap: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="navbar fade-in">
    <div>
      <h1>Trentini <span>ترينتيني</span></h1>
    </div>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <div class="menu-rapido" id="menu">
      <a href="contato.html">Contato</a>
      <a href="https://www.instagram.com">Instagram</a>
      <a href="#categorias">Categorias</a>
    </div>
  </div>

  <div class="home fade-in">
    <div class="overlay"></div>

    <div class="categorias" id="categorias">
      <a href="masculino.html" class="categoria rotate">
        <img src="botaomasculino.png" alt="Masculino">
      </a>
      <a href="feminino.html" class="categoria rotate">
        <img src="botaofeminino.png" alt="Feminino">
      </a>
      <a href="populares.html" class="categoria rotate">
        <img src="botao_populares.png" alt="Populares">
      </a>
      <a href="cremes.html" class="categoria rotate">
        <img src="botao_cremes.png" alt="Cremes">
      </a>
    </div>
  </div>

  <script>
    let rotationSpeed = 10;

    function toggleMenu() {
      const menu = document.getElementById("menu");
      menu.style.display = menu.style.display === "flex" ? "none" : "flex";
    }

    function accelerateRotation() {
      rotationSpeed = rotationSpeed / 2; // Acelera o giro
      const categories = document.querySelectorAll('.categoria');
      categories.forEach(category => {
        category.style.animation = `rotate ${rotationSpeed}s linear infinite`;
      });
    }

    // Adiciona rotação quando a página carrega
    window.onload = () => {
      const categories = document.querySelectorAll('.categoria');
      categories.forEach(category => {
        category.classList.add('rotate');
      });
    };
  </script>

</body>
</html>
