<!DOCTYPE html> <!-- Declara o tipo de documento como HTML5 -->
<html lang="pt-BR"> <!-- Define o idioma da página como português brasileiro -->
<head>
  <meta charset="UTF-8" /> <!-- Define o conjunto de caracteres como UTF-8 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- Responsivo em dispositivos móveis -->
  <title>Trentini Perfumes</title> <!-- Título da aba do navegador -->

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; } /* Remove espaçamentos padrão e ajusta caixa */
    
    body {
      background: #000 url('fundohome.jpg') no-repeat center center; /* Fundo preto com imagem centralizada */
      background-size: cover; /* Faz a imagem cobrir a tela */
      font-family: 'Segoe UI', sans-serif; /* Fonte principal */
      color: white; /* Cor do texto */
      overflow-x: hidden; /* Evita rolagem horizontal */
    }

    header {
      background: rgba(0, 0, 0, 0.8); /* Fundo semi-transparente */
      padding: 15px 30px; /* Espaçamento interno */
      display: flex; /* Layout em linha */
      justify-content: space-between; /* Espaço entre logo e menu */
      align-items: center; /* Alinha verticalmente */
      font-size: 24px; /* Tamanho da fonte */
    }

    header .logo {
      font-weight: bold; /* Texto em negrito */
    }

    .menu-icon {
      cursor: pointer; /* Mãozinha ao passar o mouse */
      font-size: 28px; /* Tamanho do ícone */
    }

    .carousel-container {
      position: relative; /* Para posicionar os botões sobre o carrossel */
      display: flex; /* Itens lado a lado */
      justify-content: center; /* Centraliza o carrossel */
      align-items: center; /* Centraliza verticalmente */
      height: 100vh; /* Altura de tela cheia */
      overflow: hidden; /* Esconde o conteúdo fora da área */
      padding: 40px 0; /* Espaçamento vertical */
    }

    .carousel {
      display: flex; /* Layout horizontal */
      gap: 30px; /* Espaço entre imagens */
      transition: transform 0.5s ease; /* Animação suave no movimento */
      align-items: center; /* Alinha verticalmente */
    }

    .carousel img {
      width: 180px; /* Largura padrão */
      height: auto; /* Altura proporcional */
      opacity: 0.3; /* Transparência padrão */
      filter: blur(3px); /* Imagem embaçada */
      transition: all 0.3s ease; /* Transições suaves */
      cursor: pointer; /* Mãozinha ao passar o mouse */
    }

    .carousel img.active {
      width: 400px; /* Imagem ativa maior */
      opacity: 1; /* Totalmente visível */
      filter: none; /* Sem blur */
      transform: scale(1.1); /* Leve zoom */
      z-index: 1; /* Fica na frente */
    }

    .nav-btn {
      background: rgba(255,255,255,0.1); /* Botão semi-transparente */
      border: none; /* Sem borda */
      color: white; /* Cor do ícone */
      font-size: 40px; /* Tamanho do ícone de seta */
      cursor: pointer; /* Mãozinha */
      padding: 10px 20px; /* Espaçamento interno */
      position: absolute; /* Posição sobre o carrossel */
      top: 50%; /* Centraliza verticalmente */
      transform: translateY(-50%); /* Ajuste fino da centralização */
      z-index: 10; /* Fica sobre as imagens */
    }

    .nav-left { left: 10px; } /* Botão da esquerda */
    .nav-right { right: 10px; } /* Botão da direita */

    @media (max-width: 768px) {
      .carousel img.active { width: 300px; } /* Reduz a imagem ativa no mobile */
      .carousel img { width: 100px; } /* Reduz todas as imagens no mobile */
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Trentini | ترينتيني</div> <!-- Nome da loja -->
    <div class="menu-icon" onclick="toggleMenu()">☰</div> <!-- Ícone do menu (função ainda não criada) -->
  </header>

  <div class="carousel-container">
    <button class="nav-btn nav-left" onclick="prevSlide()">&#10094;</button> <!-- Botão anterior -->
    <div class="carousel" id="carousel"> <!-- Área do carrossel -->
      <img src="botaomasculino.png" onclick="location.href='masculino.html'"> <!-- Redireciona pra página masculina -->
      <img src="botaofeminino.png" onclick="location.href='feminino.html'"> <!-- Redireciona pra feminina -->
      <img src="botao3.png" onclick="alert('Outro botão')"> <!-- Ação de exemplo -->
      <img src="botao4.png" onclick="alert('Mais um')"> <!-- Ação de exemplo -->
      <img src="botao5.png" onclick="alert('E outro!')"> <!-- Ação de exemplo -->
    </div>
    <button class="nav-btn nav-right" onclick="nextSlide()">&#10095;</button> <!-- Botão próximo -->
  </div>

  <script>
  const carousel = document.getElementById('carousel'); // Pega o carrossel
  let currentIndex = Math.floor(document.querySelectorAll('#carousel img').length / 2); // Começa no item do meio

  function updateCarousel() {
    const imgs = carousel.querySelectorAll('img'); // Pega todas as imagens
    imgs.forEach((img) => {
      img.classList.remove('active'); // Remove classe ativa
      img.style.zIndex = '0';
      img.style.opacity = '0.3';
      img.style.filter = 'blur(3px)';
      img.style.transform = 'scale(1)';
    });

    const activeImg = imgs[currentIndex]; // Define a imagem ativa
    activeImg.classList.add('active');
    activeImg.style.zIndex = '1';
    activeImg.style.opacity = '1';
    activeImg.style.filter = 'none';
    activeImg.style.transform = 'scale(1.1)';

    const container = document.querySelector('.carousel-container'); // Pega a largura visível
    const containerCenter = container.offsetWidth / 2;
    const activeImgRect = activeImg.getBoundingClientRect(); // Posição real da imagem ativa
    const containerRect = container.getBoundingClientRect(); // Posição do container
    const activeImgCenter = activeImgRect.left + activeImgRect.width / 2;
    const offset = activeImgCenter - (containerRect.left + containerCenter); // Calcula quanto deslocar

    carousel.style.transform = `translateX(-${offset}px)`; // Aplica a movimentação
  }

  function nextSlide() {
    const imgs = carousel.querySelectorAll('img');
    currentIndex = (currentIndex + 1) % imgs.length; // Avança circularmente
    updateCarousel(); // Atualiza visualmente
  }

  function prevSlide() {
    const imgs = carousel.querySelectorAll('img');
    currentIndex = (currentIndex - 1 + imgs.length) % imgs.length; // Volta circularmente
    updateCarousel();
  }

  window.addEventListener('load', updateCarousel); // Inicia centralizado
  window.addEventListener('resize', updateCarousel); // Recentraliza ao redimensionar a tela
  </script>

</body>
</html>
