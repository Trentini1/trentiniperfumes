<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Trentini Perfumes - Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body, html {
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    .tela-inicial {
      width: 100%;
      height: 100vh;
      background: url('fundo1.jpg') no-repeat center center/cover;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      position: relative;
      transition: background-color 0.5s ease;
    }

    .tela-inicial::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      backdrop-filter: blur(0px);
      background-color: rgba(0, 0, 0, 0);
      transition: backdrop-filter 0.8s ease, background-color 0.8s ease;
      z-index: 1;
      pointer-events: none;
    }

    .tela-inicial.blur-ativo::before {
      backdrop-filter: blur(15px);
      background-color: rgba(0, 0, 0, 0.3);
    }

    .logo-trentini {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 1500px; 
      z-index: 10;
      opacity: 0;
      transition: opacity 0.8s ease, transform 0.8s ease;
      pointer-events: none;
    }

    .logo-trentini.ativa {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .video-apresentacao {
      position: absolute;
      top: 60%;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      height: auto;
      opacity: 0;
      transition: opacity 1s ease;
      z-index: 5;
    }

    .video-apresentacao.ativa {
      opacity: 1;
    }

    @media (max-width: 600px) {
      .logo-trentini {
        width: 90%;
        height: auto;
      }
      .video-apresentacao {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<div class="tela-inicial" id="tela">
  <img src="LOGOHOME.png" alt="Trentini Logo" class="logo-trentini" id="logoTrentini">
  <video class="video-apresentacao" id="videoApresentacao" autoplay loop muted>
    <source src="video-apresentacao.mp4" type="video/mp4">
    Seu navegador não suporta o formato de vídeo.
  </video>
</div>

<script>
  const logo = document.getElementById('logoTrentini');
  const video = document.getElementById('videoApresentacao');

  setTimeout(() => {
    logo.classList.add('ativa');
    video.classList.add('ativa');
  }, 1000);
</script>

</body>
</html>
