<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - Trentini Perfumes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body, html {
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    .home {
      width: 100%;
      height: 100vh;
      background: #000;
      color: white;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: background-color 0.5s ease;
    }

    .logo-home {
      width: 600px; /* Ajuste o tamanho da logo conforme necessário */
      margin-bottom: 30px;
    }

    .video-container {
      position: relative;
      width: 100%;
      height: 60vh;
      overflow: hidden;
    }

    .video-container video {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .categorias {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 50px;
      padding: 0 20px;
      flex-wrap: wrap;
    }

    .categoria {
      background: #fff;
      color: #000;
      padding: 20px 40px;
      border-radius: 50px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    .categoria:hover {
      background: #000;
      color: #fff;
      transform: scale(1.1);
    }

    /* Responsividade */
    @media (max-width: 600px) {
      .categorias {
        flex-direction: column;
        gap: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="home">
    <img src="LOGOHOME.png" alt="Trentini Logo" class="logo-home">

    <<div class="video-container">
  <video autoplay muted loop playsinline>
    <source src="yt1z.net - ASAD by Lattafa (1080p).mp4" type="video/mp4">
    Seu navegador não suporta o vídeo.
  </video>
</div>

   <div class="categorias">
  <a href="masculino.html">
    <img src="botaomasculino.png" alt="Masculino" style="width: 500px; height: auto; cursor: pointer;">
  </a>
  <a href="feminino.html">
    <img src="botaofeminino.png" alt="Feminino" style="width: 500px; height: auto; cursor: pointer;">
  </a>
</div>

</body>
</html>
