<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - Trentini Perfumes</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      background: #000;
      font-family: 'Segoe UI', sans-serif;
      overflow-x: hidden;
    }

    .home {
      min-height: 100vh;
      background: #000;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo-home {
      width: 300px;
      margin-top: 20px;
    }

    .video-container {
      position: relative;
      width: 100%;
      height: 60vh;
      overflow: hidden;
    }

    .video-container video {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .categorias {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 30px;
      margin: 40px 0;
      padding: 0 20px;
    }

    .categorias img {
      width: 300px;
      max-width: 90%;
      height: auto;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .categorias img:hover {
      transform: scale(1.05);
    }

    @media (max-width: 600px) {
      .logo-home {
        width: 200px;
      }

      .video-container {
        height: 40vh;
      }

      .categorias {
        gap: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="home">
    <img src="LOGOHOME.png" alt="Trentini Logo" class="logo-home">

    <div class="video-container">
      <video autoplay muted loop playsinline>
        <source src="yt1z.net - ASAD by Lattafa (1080p).mp4" type="video/mp4">
        Seu navegador não suporta o vídeo.
      </video>
    </div>

    <div class="categorias">
      <a href="masculino.html">
        <img src="botaomasculino.png" alt="Masculino">
      </a>
      <a href="feminino.html">
        <img src="botaofeminino.png" alt="Feminino">
      </a>
    </div>
  </div>

</body>
</html>
