<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trentini Perfumes - Início</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #000;
      color: white;
      font-family: 'Segoe UI', sans-serif;
    }

    header {
      text-align: center;
      padding: 30px 20px 10px;
    }

    .logo {
      max-width: 250px;
      height: auto;
    }

    .video-container {
      width: 100%;
      max-width: 800px;
      margin: 20px auto;
      padding: 0 20px;
    }

    .video-container video {
      width: 100%;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
    }

    .categorias {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      padding: 40px 20px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .categoria {
      background-color: #111;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      font-weight: bold;
      transition: 0.3s;
      border: 1px solid #333;
    }

    .categoria:hover {
      background-color: #222;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

<header>
  <img src="logo-branca.png" alt="Logo Trentini" class="logo">
</header>

<section class="video-container">
  <video controls autoplay muted loop>
    <source src="video-perfume.mp4" type="video/mp4">
    Seu navegador não suporta vídeo.
  </video>
</section>

<section class="categorias">
  <div class="categoria">Masculino</div>
  <div class="categoria">Feminino</div>
  <div class="categoria">Populares</div>
  <div class="categoria">Combos</div>
  <div class="categoria">Cremes</div>
  <div class="categoria">Ofertas</div>
</section>

</body>
</html>
