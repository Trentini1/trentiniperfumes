<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home - Trentini Perfumes</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body,
    html {
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
      overflow-x: hidden;
      background: #000;
    }

    .navbar {
      width: 100%;
      height: 60px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
    }

    .navbar h1 {
      font-size: 24px;
      font-weight: bold;
    }

    .navbar span {
      font-size: 18px;
      margin-left: 10px;
      font-style: italic;
    }

    .menu-toggle {
      font-size: 28px;
      cursor: pointer;
    }

    .menu-rapido {
      position: absolute;
      top: 60px;
      right: 0;
      background: rgba(0, 0, 0, 0.9);
      color: white;
      padding: 20px;
      display: none;
      flex-direction: column;
      gap: 10px;
      z-index: 10;
    }

    .menu-rapido a {
      color: white;
      text-decoration: none;
      font-size: 18px;
    }

    .home {
      width: 100%;
      min-height: 100vh;
      background: url('fundohome.jpg') no-repeat center center;
      background-size: cover;
      color: white;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding-top: 100px;
      overflow: hidden;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 1;
    }

    .categorias {
      position: relative;
      width: 300px;
      height: 300px;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2;
      transform-style: preserve-3d;
      animation: rotate 15s infinite linear;
    }

    .categoria {
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      overflow: hidden;
      border: 5px solid #fff;
      transition: transform 0.3s ease, transform-origin 0.5s ease;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .categoria img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Rotação dos botões */
    @keyframes rotate {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    /* Efeito de foco para o centro */
    .categoria:nth-child(1) {
      transform-origin: 50% 50%;
      z-index: 2;
    }

    .categoria:hover {
      transform: scale(1.2);
    }

    /* Animação da entrada da página */
    .fade-in {
      animation: fadeIn 1.2s ease-in-out;
    }

    @keyframes fadeIn {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      .categorias {
        width: 200px;
        height: 200px;
      }

      .categoria {
        width: 90px;
        height: 90px;
      }
    }
  </style>
</head>
<body>

  <div class="navbar fade-in">
    <div>
      <h1>Trentini <span>ترينتيني</span></h1>
    </div>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <div class="menu-rapido" id="menu">
      <a href="contato.html">Contato</a>
      <a href="https://www.instagram.com">Instagram</a>
      <a href="#categorias">Categorias</a>
    </div>
  </div>

  <div class="home fade-in">
    <div class="overlay"></div>

    <div class="categorias">
      <a href="masculino.html" class="categoria" style="transform: rotate(0deg);">
        <img src="botaomasculino.png" alt="Masculino">
      </a>
      <a href="feminino.html" class="categoria" style="transform: rotate(72deg);">
        <img src="botaofeminino.png" alt="Feminino">
      </a>
      <a href="populares.html" class="categoria" style="transform: rotate(144deg);">
        <img src="botao_populares.png" alt="Populares">
      </a>
      <a href="cremes.html" class="categoria" style="transform: rotate(216deg);">
        <img src="botao_cremes.png" alt="Cremes">
      </a>
    </div>
  </div>

  <script>
    let rotationSpeed = 15; // Ajuste a velocidade de rotação

    function toggleMenu() {
      const menu = document.getElementById("menu");
      menu.style.display = menu.style.display === "flex" ? "none" : "flex";
    }

    // Inicia a rotação quando a página é carregada
    window.onload = () => {
      const categorias = document.querySelectorAll('.categoria');
      categorias.forEach((categoria, index) => {
        categoria.style.transform = `rotate(${index * 72}deg)`;
      });
    };
  </script>

</body>
</html>
