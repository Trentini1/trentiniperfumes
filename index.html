<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Trentini Perfumes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* Tela de Boas-Vindas */
    .splash {
      position: fixed;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom right, rgba(0,0,0,0.8), rgba(0,0,0,0.6)),
                  url('fundo.png') no-repeat center center;
      background-size: cover;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      z-index: 10;
      transition: opacity 1s ease;
    }

    .splash h1 {
      font-size: 3em;
      margin-bottom: 20px;
      opacity: 0.8;
      animation: fadeText 1.5s ease;
    }

    .splash p {
      font-size: 1.2em;
      opacity: 0.7;
      animation: fadeText 1.5s ease 1s;
    }

    .caixa-perfume {
      width: 250px;
      height: 300px;
      background-color: #333;
      border-radius: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 1.2em;
      text-align: center;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      opacity: 0;
      animation: showBox 2s ease forwards;
      position: relative;
    }

    .caixa-perfume img {
      width: 80%;
      transition: opacity 1s ease-in-out;
    }

    /* Caixa de perfume que abre */
    .caixa-aberta {
      width: 250px;
      height: 250px;
      border-radius: 20px;
      transition: all 1s ease;
      transform: scale(1.1);
    }

    /* Efeitos de Fade-in */
    @keyframes fadeText {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes showBox {
      from { opacity: 0; transform: translateY(-50px); }
      to { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>
<body>

  <!-- Tela de Boas-Vindas -->
  <div class="splash" id="splash">
    <h1>Bem-vindo à Trentini Perfumes</h1>
    <p>Clique em qualquer lugar para descobrir nossas fragrâncias</p>

    <!-- Caixa de Perfume (inicialmente fechada) -->
    <div class="caixa-perfume" id="caixa-perfume">
      <p>Clique para abrir</p>
      <img src="caixa-perfume.jpg" id="imagem-caixa" alt="Caixa de Perfume" style="display:none;">
    </div>

  </div>

  <script>
    const caixaPerfume = document.getElementById('caixa-perfume');
    const imagemCaixa = document.getElementById('imagem-caixa');
    const splash = document.getElementById('splash');

    // Ação de clique na tela
    document.addEventListener('click', () => {
      // Animação de abrir a caixa de perfume
      caixaPerfume.classList.add('caixa-aberta');
      imagemCaixa.style.display = 'block';
      imagemCaixa.style.opacity = 1;

      // Depois de abrir, ocultar a tela inicial
      setTimeout(() => {
        splash.style.display = 'none';
      }, 1000); // Tempo de animação de abertura
    });
  </script>

</body>
</html>
