<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Trentini Perfumes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body, html {
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
      overflow: auto; /* Permite rolar a tela */
      -webkit-overflow-scrolling: touch; /* Suaviza o scroll no iOS */
    }

    .tela-inicial {
      width: 100%;
      height: 100vh;
      background: url('fundo1.jpg') no-repeat center center/cover;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      position: relative;
      transition: background-color 0.5s ease;
    }

    .tela-inicial::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      backdrop-filter: blur(0px);
      background-color: rgba(0, 0, 0, 0);
      transition: backdrop-filter 0.8s ease, background-color 0.8s ease;
      z-index: 1;
      pointer-events: none;
    }

    .tela-inicial.blur-ativo::before {
      backdrop-filter: blur(15px);
      background-color: rgba(0, 0, 0, 0.3);
    }

    .logo-trentini {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 1500px;
      height: auto;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none;
      max-width: 100%; /* Ajusta para não ultrapassar a largura da tela */
    }

    .logo-trentini.ativa {
      opacity: 1;
    }

    .conteudo-central {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      transition: opacity 0.5s ease;
    }

    .conteudo-central h1,
    .conteudo-central p {
      animation: fadeIn 2s ease forwards;
      opacity: 0;
    }

    .conteudo-central p {
      font-size: 1.2em;
      opacity: 0.8;
      animation-delay: 1s;
    }

    .botoes {
      display: none;
      flex-direction: column;
      gap: 20px;
      margin-top: 50px;
      animation: fadeIn 1s ease forwards;
    }

    .botoes a {
      padding: 14px 24px;
      background: white;
      color: #000;
      border-radius: 40px;
      text-decoration: none;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 1.1em;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
    }

    .botoes a img {
      width: 24px;
      height: 24px;
    }

    .botoes a:hover {
      background: #000;
      color: #fff;
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .logo-trentini {
        width: 90%; /* Ajusta a logo para usar até 90% da tela no celular */
        max-width: 300px; /* Impede que a logo ultrapasse o tamanho máximo */
        height: auto;
      }
    }
  </style>
</head>
<body>

<div class="tela-inicial" id="tela">
  <img src="LOGO.png" alt="Trentini Logo" class="logo-trentini" id="logoTrentini">

  <div class="conteudo-central">
    <h1 id="bem-vindo">Bem-vindo</h1>
    <p id="descricao">Clique em qualquer lugar para começar</p>

    <div class="botoes" id="botoes">
      <a href="https://www.instagram.com/trentini.perfumes" target="_blank">
        <img src="instagram.png" alt="Instagram"> Instagram
      </a>
      <a href="index.html">🛒 Entrar na Loja</a>
    </div>
  </div>
</div>

<audio id="som1" src="spraying-perfume_0KMM3qt.mp3" preload="auto"></audio>
<audio id="som2" src="spraying-perfume_0KMM3qt.mp3" preload="auto"></audio>

<script>
  const som1 = document.getElementById('som1');
  const som2 = document.getElementById('som2');
  const tela = document.getElementById('tela');
  const logo = document.getElementById('logoTrentini');
  const botoes = document.getElementById('botoes');
  const bemVindo = document.getElementById('bem-vindo');
  const descricao = document.getElementById('descricao');

  function iniciarAnimacao() {
    tela.removeEventListener('click', iniciarAnimacao);

    tela.classList.add('blur-ativo');
    logo.classList.add('ativa');

    som1.play();
    setTimeout(() => {
      som2.currentTime = 0;
      som2.play();
    }, 300);

    bemVindo.style.display = 'none';
    descricao.style.display = 'none';

    setTimeout(() => {
      logo.classList.remove('ativa');
      tela.classList.remove('blur-ativo');
      botoes.style.display = 'flex';
    }, 2000);
  }

  tela.addEventListener('click', iniciarAnimacao);
</script>

</body>
</html>
