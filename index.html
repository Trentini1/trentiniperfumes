<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Trentini Perfumes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
      background: #000;
      overflow: hidden;
    }

    /* Tela de Boas-vindas */
    .splash {
      position: fixed;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom right, rgba(0,0,0,0.8), rgba(0,0,0,0.6)),
                  url('fundo.png') no-repeat center center;
      background-size: cover;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      z-index: 10;
      animation: fadeIn 1.5s ease forwards;
    }

    .splash img {
      width: 250px;
      max-width: 80%;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(255,255,255,0.3);
      animation: scaleUp 1s ease forwards;
    }

    .splash h1 {
      font-size: 2.8em;
      margin-bottom: 10px;
      letter-spacing: 1px;
      opacity: 0;
      animation: fadeText 1s ease 1s forwards;
    }

    .splash p {
      font-size: 1.2em;
      margin-top: 10px;
      opacity: 0.7;
      animation: fadeText 1s ease 1.5s forwards;
    }

    /* Página Inicial */
    .main-content {
      display: none;
      height: 100%;
      width: 100%;
      background: linear-gradient(to top left, rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
                  url('fundo.png') no-repeat center center fixed;
      background-size: cover;
      color: white;
      padding: 20px;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .main-content h1 {
      font-size: 3em;
      margin-bottom: 10px;
    }

    .main-content p {
      font-size: 1.2em;
      max-width: 600px;
      opacity: 0.9;
    }

    a.botao {
      margin-top: 30px;
      background: #25D366;
      color: white;
      padding: 15px 30px;
      font-size: 1.1em;
      border-radius: 30px;
      text-decoration: none;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
      transition: background 0.3s ease;
    }

    a.botao:hover {
      background: #1ea855;
    }

    /* Animações */
    @keyframes fadeOut {
      to {
        opacity: 0;
        transform: scale(1.1);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeText {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes scaleUp {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- Tela de Boas-Vindas -->
  <div class="splash" id="splash">
    <img src="logo.png" alt="Logo Trentini Perfumes"> <!-- Substitua com sua imagem -->
    <h1>Bem-vindo à Trentini Perfumes</h1>
    <p>Clique em qualquer lugar para começar</p>
  </div>

  <!-- Página Inicial -->
  <div class="main-content" id="main">
    <h1>Trentini Perfumes</h1>
    <p>Fragrâncias árabes e importadas com personalidade. Perfumes de alto padrão para quem quer marcar presença.</p>
    <a class="botao" href="loja.html">🌟 Entrar na Loja</a>
  </div>

  <script>
    const splash = document.getElementById('splash');
    const main = document.getElementById('main');

    document.addEventListener('click', () => {
      splash.style.animation = 'fadeOut 1s ease forwards';
      setTimeout(() => {
        splash.style.display = 'none';
        main.style.display = 'flex';
        setTimeout(() => {
          main.style.opacity = 1;
        }, 100);
      }, 1000);
    }, { once: true });
  </script>

</body>
</html>
