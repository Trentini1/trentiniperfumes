<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Trentini Perfumes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { height: 100%; font-family: 'Segoe UI', sans-serif; }

    .tela-inicial {
      width: 100%;
      height: 100vh;
      background: url('fundo.png') no-repeat center center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: white;
      position: relative;
      overflow: hidden;
    }

    .tela-inicial h1, .tela-inicial p {
      z-index: 2;
      animation: fadeIn 2s ease forwards;
      opacity: 0;
      text-align: center;
    }

    .tela-inicial p {
      margin-top: 15px;
      font-size: 1.2em;
      opacity: 0.8;
      animation-delay: 1s;
    }

    .filtro-blur {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      backdrop-filter: blur(12px);
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 5;
      opacity: 0;
      transition: opacity 1s ease;
      pointer-events: none;
    }

    .logo-trentini {
      position: absolute;
      top: 38%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      z-index: 6;
      width: 250px;
      height: auto;
      display: none;
      animation: popInOut 2s ease forwards;
      -webkit-mask-image: radial-gradient(circle at center, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);
      mask-image: radial-gradient(circle at center, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      -webkit-mask-size: 100% 100%;
      mask-size: 100% 100%;
    }

    .botoes {
      position: absolute;
      top: 68%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 7;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      opacity: 0;
      animation: fadeIn 1s ease forwards;
      width: 80%;
      max-width: 300px;
    }

    .botoes a {
      padding: 14px 24px;
      background: white;
      color: #000;
      border-radius: 40px;
      text-decoration: none;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 1.1em;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
    }

    .botoes a img {
      width: 24px;
      height: 24px;
    }

    .botoes a:hover {
      background: #000;
      color: #fff;
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes popInOut {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      25% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      75% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
    }

    @media (max-width: 600px) {
      .logo-trentini { top: 35%; }
      .botoes { top: 72%; }
    }
  </style>
</head>
<body>

<div class="tela-inicial" id="tela">
  <h1>Bem-vindo</h1>
  <p>Clique em qualquer lugar para começar</p>

  <div class="filtro-blur" id="blur"></div>
  <img src="LOGO.PNG" alt="Trentini Logo" class="logo-trentini" id="logoTrentini">

  <div class="botoes" id="botoes">
    <a href="https://www.instagram.com/trentini.perfumes" target="_blank">
      <img src="instagram.png" alt="Instagram"> Instagram
    </a>
    <a href="index.html">🛒 Entrar na Loja</a>
  </div>
</div>

<audio id="som1" src="spraying-perfume_0KMM3qt.mp3" preload="auto"></audio>
<audio id="som2" src="spraying-perfume_0KMM3qt.mp3" preload="auto"></audio>

<script>
  const som1 = document.getElementById('som1');
  const som2 = document.getElementById('som2');
  const blur = document.getElementById('blur');
  const logoTrentini = document.getElementById('logoTrentini');
  const botoes = document.getElementById('botoes');
  const tela = document.getElementById('tela');

  function iniciarAnimacao() {
    tela.removeEventListener('click', iniciarAnimacao);

    blur.style.opacity = '1';
    logoTrentini.style.display = 'block';

    som1.play();
    setTimeout(() => {
      som2.currentTime = 0;
      som2.play();
    }, 300);

    setTimeout(() => {
      logoTrentini.style.display = 'none';
      botoes.style.display = 'flex';
    }, 2000);
  }

  tela.addEventListener('click', iniciarAnimacao);
</script>

</body>
</html>
