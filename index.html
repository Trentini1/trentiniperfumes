<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Trentini Perfumes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { height: 100%; font-family: 'Segoe UI', sans-serif; }

    .tela-inicial {
      width: 100%;
      height: 100vh;
      background: url('fundo.png') no-repeat center center/cover;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      position: relative;
      overflow: hidden;
      background-color: rgba(0, 0, 0, 0.3); /* Transparência no fundo */
    }

    .tela-inicial h1, .tela-inicial p {
      z-index: 2;
      animation: fadeIn 2s ease forwards;
      opacity: 0;
    }

    .tela-inicial p {
      margin-top: 15px;
      font-size: 1.2em;
      opacity: 0.8;
      animation-delay: 1s;
    }

    .filtro-blur {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      backdrop-filter: blur(12px);
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 5;
      opacity: 0;
      transition: opacity 1s ease;
      pointer-events: none;
    }

    .foco-trentini {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      font-size: 3.5em;
      color: white;
      z-index: 6;
      background: rgba(0, 0, 0, 0.3);
      padding: 25px 50px;
      border-radius: 20px;
      display: none;
      animation: popIn 1s ease forwards;
    }

    .botoes {
      position: absolute;
      bottom: 50px;
      z-index: 7;
      gap: 20px;
      display: none;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      animation: fadeIn 1s ease forwards;
    }

    .botoes a {
      padding: 12px 24px;
      background: #fff;
      color: #000;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s ease;
    }

    .botoes a:hover {
      background: #000;
      color: #fff;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes popIn {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }
  </style>
</head>
<body>

<div class="tela-inicial" id="tela">
  <h1>Bem-vindo</h1>
  <p>Clique em qualquer lugar para começar</p>

  <div class="filtro-blur" id="blur"></div>
  <div class="foco-trentini" id="trentini">TRENTINI</div>

  <div class="botoes" id="botoes">
    <a href="https://www.instagram.com/trentini.perfumes" target="_blank">Instagram</a>
    <a href="index.html">Entrar na Loja</a>
  </div>
</div>

<!-- Som do perfume sendo borrifado (deve estar no mesmo diretório) -->
<audio id="som1" src="spraying-perfume_0KMM3qt.mp3" preload="auto"></audio>
<audio id="som2" src="spraying-perfume_0KMM3qt.mp3" preload="auto"></audio>

<script>
  const som1 = document.getElementById('som1');
  const som2 = document.getElementById('som2');
  const tela = document.getElementById('tela');  // Corrigido aqui, referenciando a tela corretamente
  const blur = document.getElementById('blur');
  const trentini = document.getElementById('trentini');
  const botoes = document.getElementById('botoes');

  tela.addEventListener('click', () => {
    blur.style.opacity = '1';
    trentini.style.display = 'block';

    // Tocar o som 2x, alternando entre as duas instâncias de áudio
    som1.play();
    setTimeout(() => {
      som2.currentTime = 0;  // Resetando o segundo áudio
      som2.play();
    }, 300); // Intervalo de 300ms

    // Exibir os botões e animar
    botoes.style.display = 'flex';
    botoes.style.animation = 'fadeIn 1s ease forwards';
  });
</script>

</body>
</html>
