<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Trentini Perfumes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'Segoe UI', sans-serif; }

    .tela-inicial {
      width: 100%;
      height: 100vh;
      background: url('fundo.png') no-repeat center center/cover;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      color: white;
    }

    .filtro-blur {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      backdrop-filter: blur(12px);
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 5;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s ease;
    }

    .conteudo-central {
      position: relative;
      z-index: 6;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .conteudo-central h1 {
      font-size: 2.5em;
      animation: fadeIn 2s ease forwards;
      opacity: 0;
    }

    .conteudo-central p {
      font-size: 1.1em;
      animation: fadeIn 2s ease forwards;
      animation-delay: 0.5s;
      opacity: 0;
    }

   .logo-trentini {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.8);
  z-index: 6;
  width: 250px;
  height: auto;
  display: none;
  animation: popInOut 2s ease forwards;

  /* Usar a máscara para o efeito suave de desfoque */
  -webkit-mask-image: radial-gradient(circle at center, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);
  mask-image: radial-gradient(circle at center, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);
  mask-repeat: no-repeat;
  mask-size: cover;

  /* Garantir que a logo não seja afetada pelo desfoque */
  pointer-events: none; /* Impede interação com a logo durante a animação */
}

    .botoes {
      display: none;
      flex-direction: column;
      gap: 20px;
      margin-top: 50px; /* Subido um pouco mais */
      animation: fadeIn 1s ease forwards;
    }

    .botoes a {
      padding: 14px 24px;
      background: white;
      color: #000;
      border-radius: 40px;
      text-decoration: none;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 1.1em;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
    }

    .botoes a img {
      width: 24px;
      height: 24px;
    }

    .botoes a:hover {
      background: #000;
      color: #fff;
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes popInOut {
      0% { opacity: 0; transform: scale(0.8); }
      25% { opacity: 1; transform: scale(1); }
      75% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.8); }
    }

    @media (max-width: 600px) {
      .conteudo-central h1 {
        font-size: 2em; /* Ajustado para celular */
      }
      .conteudo-central p {
        font-size: 1em;
      }
      .logo-trentini {
        width: 200px; /* Ajustado para celular */
      }
    }
  </style>
</head>
<body>

<div class="tela-inicial" id="tela">
  <div class="filtro-blur" id="blur"></div> <!-- <-- Move para cá -->

  <div class="conteudo-central">
    <h1 id="bem-vindo">Bem-vindo</h1>
    <p id="descricao">Clique em qualquer lugar para começar</p>

    <img src="LOGO.PNG" alt="Trentini Logo" class="logo-trentini" id="logoTrentini">

    <div class="botoes" id="botoes">
      <a href="https://www.instagram.com/trentini.perfumes" target="_blank">
        <img src="instagram.png" alt="Instagram"> Instagram
      </a>
      <a href="index.html">🛒 Entrar na Loja</a>
    </div>
  </div>
</div>

<audio id="som1" src="spraying-perfume_0KMM3qt.mp3" preload="auto"></audio>
<audio id="som2" src="spraying-perfume_0KMM3qt.mp3" preload="auto"></audio>

<script>
  const som1 = document.getElementById('som1');
  const som2 = document.getElementById('som2');
  const blur = document.getElementById('blur');
  const logoTrentini = document.getElementById('logoTrentini');
  const botoes = document.getElementById('botoes');
  const tela = document.getElementById('tela');
  const bemVindo = document.getElementById('bem-vindo');
  const descricao = document.getElementById('descricao');

  function iniciarAnimacao() {
    // Evita repetição: remove o clique
    tela.removeEventListener('click', iniciarAnimacao);

    // Aplica o desfoque e exibe a logo
    blur.style.opacity = '1';
    logoTrentini.style.display = 'block';

    som1.play();
    setTimeout(() => {
      som2.currentTime = 0;
      som2.play();
    }, 300);

    // Esconde os textos "Bem-vindo" e "Clique em qualquer lugar"
    bemVindo.style.opacity = '0';
    descricao.style.opacity = '0';

    // Aguarda 2 segundos para esconder a logo e mostrar os botões
    setTimeout(() => {
      logoTrentini.style.display = 'none';
      botoes.style.display = 'flex';
      blur.style.opacity = '0';  // Esconde o desfoque após a logo desaparecer
    }, 2000); // Atraso de 2 segundos para garantir a transição suave
  }

  // Garante que o clique na tela inicie a animação
  tela.addEventListener('click', iniciarAnimacao);
</script>

</body>
</html>
