<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Trentini Perfumes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }
    .tela-inicial {
      width: 100%;
      height: 100vh;
      background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), url('fundo1.jpg') no-repeat center center/cover;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      position: relative;
      overflow: hidden;
    }
    .tela-inicial h1, .tela-inicial p {
      z-index: 2;
      animation: fadeIn 2s ease forwards;
      opacity: 0;
    }
    .tela-inicial p {
      margin-top: 15px;
      font-size: 1.2em;
      opacity: 0.8;
      animation-delay: 1s;
    }
    .filtro-blur {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 300px;
      height: 300px;
      transform: translate(-50%, -50%);
      backdrop-filter: blur(15px);
      background-color: rgba(0, 0, 0, 0.4);
      z-index: 4; /* antes estava 5 */
  opacity: 0;
  border-radius: 50%;
  pointer-events: none;
  transition: opacity 0.5s ease;
    }
    .logo-trentini {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 6;
      width: 250px;
      height: auto;
      display: none;
    }
    .conteudo-central {
      position: relative;
      z-index: 6;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .botoes {
      display: none;
      flex-direction: column;
      gap: 20px;
      margin-top: 50px;
      animation: fadeIn 1s ease forwards;
    }
    .botoes a {
      padding: 14px 24px;
      background: white;
      color: #000;
      border-radius: 40px;
      text-decoration: none;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 1.1em;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
    }
    .botoes a img {
      width: 24px;
      height: 24px;
    }
    .botoes a:hover {
      background: #000;
      color: #fff;
      transform: scale(1.05);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 600px) {
      .conteudo-central h1 {
        font-size: 2em;
      }
      .conteudo-central p {
        font-size: 1em;
      }
      .logo-trentini {
        width: 200px;
      }
    }
  </style>
</head>
<body>

<div class="tela-inicial" id="tela">
  <div class="filtro-blur" id="blur"></div>
  <img src="TRENTINI PERFUMES.png" alt="Trentini Logo" class="logo-trentini" id="logoTrentini">

  <div class="conteudo-central">
    <h1 id="bem-vindo">Bem-vindo</h1>
    <p id="descricao">Clique em qualquer lugar para começar</p>

    <div class="botoes" id="botoes">
      <a href="https://www.instagram.com/trentini.perfumes" target="_blank">
        <img src="instagram.png" alt="Instagram"> Instagram
      </a>
      <a href="index.html">🛒 Entrar na Loja</a>
    </div>
  </div>
</div>

<audio id="som1" src="spraying-perfume_0KMM3qt.mp3" preload="auto"></audio>
<audio id="som2" src="spraying-perfume_0KMM3qt.mp3" preload="auto"></audio>

<script>
  const som1 = document.getElementById('som1');
  const som2 = document.getElementById('som2');
  const blur = document.getElementById('blur');
  const logoTrentini = document.getElementById('logoTrentini');
  const botoes = document.getElementById('botoes');
  const tela = document.getElementById('tela');
  const bemVindo = document.getElementById('bem-vindo');
  const descricao = document.getElementById('descricao');

  function iniciarAnimacao() {
    tela.removeEventListener('click', iniciarAnimacao);

    // Ativa o blur e a logo
    blur.style.opacity = '1';
    logoTrentini.style.display = 'block';

    som1.play();
    setTimeout(() => {
      som2.currentTime = 0;
      som2.play();
    }, 300);

    // Esconde os textos "Bem-vindo" e "Clique"
    bemVindo.style.display = 'none';
    descricao.style.display = 'none';

    // Após 2s, tira a logo, tira o blur e mostra os botões
    setTimeout(() => {
      logoTrentini.style.display = 'none';
      blur.style.opacity = '0';
      botoes.style.display = 'flex';
    }, 2000);
  }

  tela.addEventListener('click', iniciarAnimacao);
</script>

</body>
</html>
