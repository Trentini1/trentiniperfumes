<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trentini Perfumes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000 url('fundohome.jpg') no-repeat center center;
      background-size: cover;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      overflow-x: hidden;
    }

    header {
      background: rgba(0, 0, 0, 0.8);
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 24px;
    }

    .logo { font-weight: bold; }
    .menu-icon { cursor: pointer; font-size: 28px; }

    .intro {
      text-align: center;
      margin-top: 80px;
      padding: 20px;
    }

    .intro h1 {
      font-size: 48px;
      font-weight: bold;
      text-shadow: 2px 2px 5px #000;
    }

    .intro p {
      margin-top: 10px;
      font-size: 20px;
      color: #ccc;
    }

    .categoria-container {
      position: relative;
      padding: 60px 0;
      overflow: hidden;
    }

    .categoria-scroll {
      display: flex;
      gap: 20px;
      overflow-x: auto;
      scroll-behavior: smooth;
      padding: 0 50px;
    }

    .categoria-scroll::-webkit-scrollbar {
      display: none;
    }

    .categoria-btn {
      background-color: rgba(255,255,255,0.1);
      border: 2px solid white;
      color: white;
      font-size: 20px;
      padding: 20px 40px;
      border-radius: 15px;
      cursor: pointer;
      min-width: 200px;
      transition: transform 0.3s ease, background 0.3s ease;
    }

    .categoria-btn:hover {
      background: white;
      color: black;
      transform: scale(1.05);
    }

    .seta {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      font-size: 30px;
      padding: 10px;
      cursor: pointer;
      z-index: 10;
    }

    .seta.esquerda { left: 10px; }
    .seta.direita { right: 10px; }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 14px;
      color: #aaa;
      background: rgba(0,0,0,0.7);
      position: fixed;
      bottom: 0;
      width: 100%;
    }

    /* Botão do WhatsApp flutuante */
    .whatsapp-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 60px;
      height: 60px;
      background: url('watz.png') no-repeat center center;
      background-size: contain;
      border: none;
      cursor: pointer;
      z-index: 100;
      transition: transform 0.3s ease;
    }

    .whatsapp-btn:hover {
      transform: scale(1.1);
    }

    @media (max-width: 768px) {
      .categoria-btn { min-width: 140px; font-size: 16px; }
      .intro h1 { font-size: 32px; }
      .intro p { font-size: 16px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Trentini | ترينتيني</div>
    <div class="menu-icon" onclick="toggleMenu()">☰</div>
  </header>

  <div class="intro">
    <h1>Bem-vindo à Trentini Perfumes</h1>
    <p>Descubra fragrâncias únicas e marcantes</p>
  </div>

  <div class="categoria-container">
    <button class="seta esquerda" onclick="scrollCategorias(-1)">&#10094;</button>
    <div class="categoria-scroll" id="categoriaScroll">
      <button class="categoria-btn" onclick="location.href='masculino.html'">Masculino</button>
      <button class="categoria-btn" onclick="location.href='feminino.html'">Feminino</button>
      <button class="categoria-btn" onclick="alert('Promoções')">Promoções</button>
      <button class="categoria-btn" onclick="alert('Importados')">Importados</button>
      <button class="categoria-btn" onclick="alert('Mais Vendidos')">Mais Vendidos</button>
      <button class="categoria-btn" onclick="alert('Lançamentos')">Lançamentos</button>
    </div>
    <button class="seta direita" onclick="scrollCategorias(1)">&#10095;</button>
  </div>

  <footer>
    © 2025 Trentini Perfumes. Todos os direitos reservados.
  </footer>

  <!-- Botão do WhatsApp -->
  <a href="https://wa.me/554195252161" target="_blank">
    <button class="whatsapp-btn"></button>
  </a>

  <script>
    function scrollCategorias(direcao) {
      const container = document.getElementById('categoriaScroll');
      const scrollAmount = 300;
      container.scrollBy({ left: direcao * scrollAmount, behavior: 'smooth' });
    }

    function toggleMenu() {
      alert('Menu ainda não implementado.');
    }
  </script>

</body>
</html>
